name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]
  # Manual trigger — lets you cut a "media" release (audio + video backends
  # enabled) from any branch or tag without touching the default build matrix.
  workflow_dispatch:
    inputs:
      with_audio:
        description: "Build with CSound audio backend (SGF_WITH_AUDIO=ON)"
        type: boolean
        default: false
      with_video:
        description: "Build with FFmpeg video backend (SGF_WITH_VIDEO=ON)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS 15 · AppleClang 16
    runs-on: macos-15
    timeout-minutes: 60
    # WITH_AUDIO / WITH_VIDEO resolve to "ON"/"OFF" strings consumed by cmake.
    # MEDIA_LABEL becomes e.g. "-media" when either flag is ON so artifact
    # names are unique across standard and media builds in the same repo.
    env:
      WITH_AUDIO: ${{ inputs.with_audio && 'ON' || 'OFF' }}
      WITH_VIDEO: ${{ inputs.with_video && 'ON' || 'OFF' }}
      MEDIA_LABEL: ${{ (inputs.with_audio || inputs.with_video) && '-media' || '' }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: lukka/get-cmake@latest
        with: { cmakeVersion: "~3.31.0" }

      - name: Cache CPM deps
        uses: actions/cache@v4
        with:
          path: ~/.cpm-cache
          key: cpm-macos-${{ hashFiles('CMakeLists.txt','CMakePresets.json','external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-macos-

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-macos-${{ hashFiles('frontend/packages/react-client/bun.lock') }}
          restore-keys: bun-macos-

      - name: Cache ORT download (macOS)
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/onnxruntime-src
            build/_deps/onnxruntime-subbuild
          key: ort-macos-arm64-1.25.1

      # ── Optional media deps (macOS — brew is available on the runner) ───────
      - name: Install audio deps (macOS)
        if: inputs.with_audio
        run: brew install csound

      - name: Install video deps (macOS)
        if: inputs.with_video
        run: brew install ffmpeg

      - name: Download NLP models
        run: python3 scripts/download_models.py download --models embed,vocab

      - name: Frontend
        working-directory: frontend/packages/react-client
        run: |
          bun install --frozen-lockfile
          bun run i18n:compile
          bun run build.ts --minify

      - name: Configure
        run: >
          cmake -B build --preset ci-macos
          -DSGF_WITH_AUDIO=${{ env.WITH_AUDIO }}
          -DSGF_WITH_VIDEO=${{ env.WITH_VIDEO }}

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Package (DMG)
        working-directory: build
        run: cpack -C Release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: installer-macos${{ env.MEDIA_LABEL }}-${{ github.sha }}
          path: build/Syngrafo-*.dmg
          if-no-files-found: warn

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Ubuntu 24.04 · Clang 20
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      WITH_AUDIO: ${{ inputs.with_audio && 'ON' || 'OFF' }}
      WITH_VIDEO: ${{ inputs.with_video && 'ON' || 'OFF' }}
      MEDIA_LABEL: ${{ (inputs.with_audio || inputs.with_video) && '-media' || '' }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: lukka/get-cmake@latest
        with: { cmakeVersion: "~3.31.0" }

      # Ubuntu 24.04 (Noble) ships clang-18 by default.
      # clang-20 is available from the upstream LLVM apt repository.
      - name: Add LLVM 20 apt repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-20.list >/dev/null
          sudo apt-get update -qq

      - name: Install system deps
        run: |
          sudo apt-get install -y --no-install-recommends \
            clang-20 libc++-20-dev libc++abi-20-dev lld-20 \
            libwebkitgtk-6.0-dev libgtk-4-dev libadwaita-1-dev \
            libjson-glib-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev \
            ninja-build pkg-config

      # ── Optional media deps (Linux) ─────────────────────────────────────────
      - name: Install audio deps (Linux)
        if: inputs.with_audio
        run: sudo apt-get install -y --no-install-recommends libcsound64-dev

      - name: Install video deps (Linux)
        if: inputs.with_video
        run: |
          sudo apt-get install -y --no-install-recommends \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev

      - name: Cache CPM deps
        uses: actions/cache@v4
        with:
          path: ~/.cpm-cache
          key: cpm-linux-${{ hashFiles('CMakeLists.txt','CMakePresets.json','external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-linux-

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-linux-${{ hashFiles('frontend/packages/react-client/bun.lock') }}
          restore-keys: bun-linux-

      # Cache the ORT FetchContent download (src + stamp) so the ~230 MB tarball
      # is only fetched once per version.  On a cache hit CMake finds the
      # ExternalProject stamp and skips the download step entirely.
      - name: Cache ORT download (Linux)
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/onnxruntime-src
            build/_deps/onnxruntime-subbuild
          key: ort-linux-x64-1.25.1

      - name: Download NLP models
        run: python3 scripts/download_models.py download --models embed,vocab,ocr

      - name: Frontend
        working-directory: frontend/packages/react-client
        run: |
          bun install --frozen-lockfile
          bun run i18n:compile
          bun run build.ts --minify

      - name: Configure
        run: >
          cmake -B build --preset ci-linux
          -DSGF_WITH_AUDIO=${{ env.WITH_AUDIO }}
          -DSGF_WITH_VIDEO=${{ env.WITH_VIDEO }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package (DEB + TGZ)
        working-directory: build
        run: cpack -C Release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: installer-linux${{ env.MEDIA_LABEL }}-${{ github.sha }}
          # Upload both the .deb and the .tar.gz produced by CPack
          path: |
            build/Syngrafo-*.deb
            build/Syngrafo-*.tar.gz
          if-no-files-found: warn

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows 2025 · MSVC
    runs-on: windows-2025
    timeout-minutes: 90
    env:
      # Force Python UTF-8 I/O on Windows (belt-and-suspenders alongside the
      # sys.stdout.reconfigure() call in download_models.py — avoids cp1252
      # UnicodeEncodeError from the progress bar's block characters).
      PYTHONUTF8: "1"
      WITH_AUDIO: ${{ inputs.with_audio && 'ON' || 'OFF' }}
      WITH_VIDEO: ${{ inputs.with_video && 'ON' || 'OFF' }}
      MEDIA_LABEL: ${{ (inputs.with_audio || inputs.with_video) && '-media' || '' }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, submodules: recursive }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: lukka/get-cmake@latest
        with: { cmakeVersion: "~3.31.0", ninjaVersion: "latest" }

      - name: Cache CPM deps
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/cpm-cache
          key: cpm-windows-${{ hashFiles('CMakeLists.txt','CMakePresets.json','external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-windows-

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-windows-${{ hashFiles('frontend/packages/react-client/bun.lock') }}
          restore-keys: bun-windows-

      # Cache the ORT FetchContent download (src + stamp) so the ~230 MB zip
      # is only fetched once per version.
      - name: Cache ORT download (Windows)
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/onnxruntime-src
            build/_deps/onnxruntime-subbuild
          key: ort-windows-x64-1.25.1

      - name: Download NLP models
        run: python3 scripts/download_models.py download --models embed,vocab,ocr

      - name: Frontend
        working-directory: frontend/packages/react-client
        run: |
          bun install --frozen-lockfile
          bun run i18n:compile
          bun run build.ts --minify

      - uses: ilammy/msvc-dev-cmd@v1

      # Windows Server 2025 ships curl.exe but not the libcurl dev package.
      # vcpkg is pre-installed on all GitHub-hosted Windows runners.
      # Tesseract is NOT installed here: the ONNX OCR backend (ocr_addon_onnx.cpp)
      # auto-activates when no Tesseract target is found and NLP_WITH_ONNX=ON (default).
      - name: Install system deps (Windows)
        run: vcpkg install curl:x64-windows

      # ── Optional media deps (Windows — vcpkg) ───────────────────────────────
      - name: Install audio deps (Windows)
        if: inputs.with_audio
        run: vcpkg install csound:x64-windows

      - name: Install video deps (Windows)
        if: inputs.with_video
        run: vcpkg install ffmpeg:x64-windows

      - name: Configure
        # Pass vcpkg's installed-packages directory as CMAKE_PREFIX_PATH so that
        # find_package(CURL REQUIRED) resolves correctly.  We deliberately do NOT
        # use -DCMAKE_TOOLCHAIN_FILE: vcpkg's toolchain wraps add_library globally
        # and its _add_library hook recurses infinitely when saucer calls add_library
        # (vcpkg bug reproducible with CMake 3.28+ + vcpkg 2024+).
        run: >
          cmake -B build --preset ci-windows
          "-DCMAKE_PREFIX_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
          "-DSGF_WITH_AUDIO=$env:WITH_AUDIO"
          "-DSGF_WITH_VIDEO=$env:WITH_VIDEO"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (NSIS + ZIP)
        working-directory: build
        # NSIS is pre-installed on windows-2025 GitHub Actions runners.
        run: cpack -C Release
        shell: bash

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: installer-windows${{ env.MEDIA_LABEL }}-${{ github.sha }}
          # Upload both the NSIS .exe installer and the portable .zip
          path: |
            build/Syngrafo-*.exe
            build/Syngrafo-*.zip
          if-no-files-found: warn

  # ── Release (tag only) ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      MEDIA_LABEL: ${{ (inputs.with_audio || inputs.with_video) && '-media' || '' }}

    steps:
      - uses: actions/checkout@v4

      # Download all three installer artifacts into the same dist/ directory.
      # CPack names them Syngrafo-<ver>-{Darwin,Linux,Windows}.{dmg,deb,…}
      # so the filenames are unique and can all live in one flat directory.
      # The MEDIA_LABEL suffix must match what the build jobs produced.
      - uses: actions/download-artifact@v4
        with:
          name: "installer-macos${{ env.MEDIA_LABEL }}-${{ github.sha }}"
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: "installer-linux${{ env.MEDIA_LABEL }}-${{ github.sha }}"
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: "installer-windows${{ env.MEDIA_LABEL }}-${{ github.sha }}"
          path: dist

      - name: List release assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Publish every installer CPack produced — DMG, DEB, TGZ, EXE, ZIP
          files: dist/Syngrafo-*
