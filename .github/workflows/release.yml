name: CI

on:
  push:
    branches: ["**"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: ["**"]

# Cancel duplicate runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS (Apple Silicon)
    runs-on: macos-14          # Apple Silicon runner, AppleClang 15+

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history for version tags
          submodules: recursive

      # ── Tooling ────────────────────────────────────────────────────────────

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"

      # ── CPM / FetchContent cache ───────────────────────────────────────────
      # Caches saucer, ONNX Runtime, nlohmann-json, etc.

      - name: Cache CPM / FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/_deps
            ~/.cpm-cache
          key:          cpm-macos-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-macos-

      # ── NLP model data (tessdata not needed on macOS — uses Apple Vision) ──

      - name: Download required NLP models
        run: python3 scripts/download_models.py download --models embed,vocab
        working-directory: ${{ github.workspace }}

      # ── Frontend ───────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Compile i18n catalogs
        run: bun run i18n:compile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Build frontend bundle
        run: bun run build.ts --minify
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      # ── Native build ───────────────────────────────────────────────────────

      - name: Configure CMake
        run: cmake -B build --preset ci-macos
        working-directory: ${{ github.workspace }}

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)
        working-directory: ${{ github.workspace }}

      # ── Artifact ───────────────────────────────────────────────────────────

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: papiere-macos-${{ github.sha }}
          path: build/papiere.app
          if-no-files-found: warn


  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (Ubuntu 24.04, Clang 18)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ── Tooling ────────────────────────────────────────────────────────────

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 libc++-18-dev libc++abi-18-dev \
            libwebkitgtk-6.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libtesseract-dev \
            tesseract-ocr-eng \
            tesseract-ocr-deu \
            tesseract-ocr-fra \
            tesseract-ocr-spa \
            tesseract-ocr-ita \
            tesseract-ocr-por \
            tesseract-ocr-jpn \
            tesseract-ocr-chi-sim \
            tesseract-ocr-rus \
            tesseract-ocr-ell \
            tesseract-ocr-ara \
            ninja-build \
            pkg-config

      # ── CPM / FetchContent cache ───────────────────────────────────────────

      - name: Cache CPM / FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/_deps
            ~/.cpm-cache
          key:          cpm-linux-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-linux-

      # ── NLP models ─────────────────────────────────────────────────────────

      - name: Download required NLP models
        run: python3 scripts/download_models.py download --models embed,vocab
        working-directory: ${{ github.workspace }}

      # ── Frontend ───────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Compile i18n catalogs
        run: bun run i18n:compile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Build frontend bundle
        run: bun run build.ts --minify
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      # ── Native build ───────────────────────────────────────────────────────

      - name: Configure CMake
        run: cmake -B build --preset ci-linux
        working-directory: ${{ github.workspace }}

      - name: Build
        run: cmake --build build --parallel $(nproc)
        working-directory: ${{ github.workspace }}

      # ── Artifact ───────────────────────────────────────────────────────────

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: papiere-linux-${{ github.sha }}
          path: build/papiere
          if-no-files-found: warn


  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (MSVC, Release)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ── Tooling ────────────────────────────────────────────────────────────

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "latest"

      # ── CPM / FetchContent cache ───────────────────────────────────────────

      - name: Cache CPM / FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/_deps
            ~/AppData/Local/cpm-cache
          key:          cpm-windows-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'external/nlp/CMakeLists.txt') }}
          restore-keys: cpm-windows-

      # ── NLP models ─────────────────────────────────────────────────────────

      - name: Download required NLP models
        run: python3 scripts/download_models.py download --models embed,vocab
        working-directory: ${{ github.workspace }}

      # ── Frontend ───────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Compile i18n catalogs
        run: bun run i18n:compile
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      - name: Build frontend bundle
        run: bun run build.ts --minify
        working-directory: ${{ github.workspace }}/frontend/packages/react-client

      # ── Native build ───────────────────────────────────────────────────────

      - name: Configure CMake (MSVC via Developer Command Prompt)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build --preset ci-windows
        working-directory: ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release --parallel
        working-directory: ${{ github.workspace }}

      # ── Artifact ───────────────────────────────────────────────────────────

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: papiere-windows-${{ github.sha }}
          path: build/Release/papiere.exe
          if-no-files-found: warn


  # ── Release (version tag only) ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: papiere-macos-${{ github.sha }}
          path: release/macos/papiere.app

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: papiere-linux-${{ github.sha }}
          path: release/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: papiere-windows-${{ github.sha }}
          path: release/windows

      - name: Package artifacts
        run: |
          cd release/macos
          zip -r "../papiere-macos-${{ github.ref_name }}.zip" papiere.app
          cd ../../release/linux
          chmod +x papiere
          tar -czf "../papiere-linux-${{ github.ref_name }}.tar.gz" papiere
          cd ../../release/windows
          zip "../papiere-windows-${{ github.ref_name }}.zip" papiere.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "Papiere ${{ github.ref_name }}"
          draft:      false
          # Tags with a hyphen (e.g. v1.0.0-beta.1) are marked as pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release/papiere-macos-${{ github.ref_name }}.zip
            release/papiere-linux-${{ github.ref_name }}.tar.gz
            release/papiere-windows-${{ github.ref_name }}.zip
