name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Trigger logic
# ─────────────────────────────────────────────────────────────────────────────
#
#   push → prod branch   Every commit to prod creates / overwrites a
#                        rolling pre-release tagged v{version} (read from
#                        CMakeLists.txt). Good for "latest" QA builds.
#
#   push → v*.*.*  tag   Creates a permanent, versioned stable release.
#                        Workflow: bump VERSION in CMakeLists.txt → commit →
#                        push → then:  git tag v1.2.3 && git push origin v1.2.3
#
#   pull_request         Builds only, no release (validates the branch).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["prod"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["prod", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # macOS — Apple Silicon (arm64), AppleClang, WebKit backend
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/_deps
            ~/.cpm-cache
          key: cpm-macos-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: cpm-macos-

      - name: Build frontend
        working-directory: ${{ github.workspace }}/frontend/packages/react-client
        run: |
          bun install
          bun run build.ts --minify

      - name: Configure CMake
        run: cmake -B build --preset ci-macos

      - name: Delete stale PCH files
        # saucer-fill propagates PCH to saucer and saucer-desktop.
        # If Xcode / the SDK is updated between configure and build the mtime
        # check fails for any of those .pch files. Wipe all of them.
        run: find build/_deps -name '*.pch' -delete 2>/dev/null || true

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Package .app bundle
        # Ad-hoc sign so Gatekeeper shows "open anyway" rather than a hard block.
        # Full notarization requires an Apple Developer ID — not available in CI.
        # Users can also bypass manually: right-click → Open, or
        #   sudo xattr -rd com.apple.quarantine /Applications/papiere.app
        run: |
          codesign --force --deep --sign - build/papiere.app
          mkdir -p dist
          ditto -c -k --keepParent build/papiere.app dist/papiere-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: papiere-macos
          path: dist/papiere-macos-arm64.zip
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Linux — x86_64, Clang 20 + libc++, WebKitGtk backend
  #
  # Clang 20 is required: saucer v8.0.5 uses C++23 SFINAE on ereignis
  # internals that Clang < 20 rejects as a hard error.
  # Installed via the official LLVM APT repository for Ubuntu 24.04 (noble).
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Install system dependencies
        run: |
          # Add official LLVM APT repository for Clang 20 on Ubuntu 24.04 (noble).
          # The default Ubuntu repos only ship up to Clang 18.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-20 libc++-20-dev libc++abi-20-dev lld-20 \
            libwebkitgtk-6.0-dev \
            libadwaita-1-dev \
            libjson-glib-dev \
            libsqlite3-dev \
            ninja-build \
            pkg-config

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/_deps
            ~/.cpm-cache
          key: cpm-linux-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: cpm-linux-

      - name: Build frontend
        working-directory: ${{ github.workspace }}/frontend/packages/react-client
        run: |
          bun install
          bun run build.ts --minify

      - name: Configure CMake
        run: cmake -B build --preset ci-linux

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package binary
        run: |
          strip build/papiere
          mkdir -p dist
          tar -czf dist/papiere-linux-x86_64.tar.gz -C build papiere

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: papiere-linux
          path: dist/papiere-linux-x86_64.tar.gz
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Windows — x64, MSVC 2022 + Ninja, WebView2 backend
  #
  # WebView2 is bundled with Edge and present on every Windows 10/11 machine.
  # SQLite3 is compiled from the official C amalgamation (project LANGUAGES C CXX).
  # No vcpkg toolchain — it causes infinite recursion inside FetchContent on
  # CMake 3.31+ (vcpkg intercepts find_package calls FetchContent makes internally).
  #
  # continue-on-error: true so a Windows failure never blocks macOS/Linux releases
  # while the Windows port is being stabilised.
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (x64)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Set up MSVC (x64)
        # Puts cl.exe, link.exe, rc.exe etc. on PATH and sets INCLUDE/LIB
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: cpm-windows-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: cpm-windows-

      - name: Build frontend
        working-directory: ${{ github.workspace }}/frontend/packages/react-client
        run: |
          bun install
          bun run build.ts --minify

      - name: Download SQLite amalgamation (Windows)
        # CMake's built-in HTTPS download is fragile on Windows CI (SSL/TLS issues
        # with sqlite.org). Pre-download with PowerShell (better TLS stack) and
        # point FetchContent to the local path via FETCHCONTENT_SOURCE_DIR so CMake
        # skips its own download entirely.
        shell: pwsh
        run: |
          $url  = "https://www.sqlite.org/2026/sqlite-amalgamation-3530000.zip"
          $dest = "sqlite3_amal.zip"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Expand-Archive -Path $dest -DestinationPath .
          Write-Host "SQLite extracted to: $(Resolve-Path sqlite-amalgamation-3530000)"

      - name: Configure CMake
        # No vcpkg toolchain — SQLite3 is built from amalgamation by CMakeLists.txt.
        # FETCHCONTENT_SOURCE_DIR_SQLITE3_AMALGAMATION tells CMake to use the
        # pre-downloaded directory, bypassing FetchContent's own download step.
        shell: pwsh
        run: |
          $sqSrc = "${{ github.workspace }}/sqlite-amalgamation-3530000" -replace '\\','/'
          cmake -B build --preset ci-windows "-DFETCHCONTENT_SOURCE_DIR_SQLITE3_AMALGAMATION=$sqSrc"

      - name: Build
        run: cmake --build build --parallel

      - name: Package binary
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\papiere.exe -DestinationPath dist\papiere-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: papiere-windows
          path: dist\papiere-windows-x64.zip
          if-no-files-found: warn # warn, not error — port is still in progress

  # ───────────────────────────────────────────────────────────────────────────
  # Release
  #
  # Runs when:
  #   • pushed to the prod branch  → rolling pre-release, tag = v{CMake version}
  #   • a v*.*.* tag is pushed     → stable versioned release
  #
  # Uses ncipollo/release-action with allowUpdates + replacesArtifacts so
  # repeated prod pushes silently overwrite the previous rolling build.
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    # always() lets this job evaluate its if-condition even when a needed
    # job failed.  We then require at least macOS or Linux to have succeeded.
    if: >
      always() &&
      (github.ref == 'refs/heads/prod' || startsWith(github.ref, 'refs/tags/v')) &&
      (needs.build-macos.result == 'success' || needs.build-linux.result == 'success')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # ── Explicit tag push → stable versioned release ──────────────
            TAG="${GITHUB_REF_NAME}"
            NAME="Papiere ${TAG}"
            # A hyphen in the tag (v1.0.0-rc1, v2.0.0-beta) marks a pre-release
            [[ "${TAG}" == *-* ]] && PRE=true || PRE=false
            LATEST=true
          else
            # ── prod branch push → rolling pre-release ────────────────────
            # Single source of truth: the VERSION file at the repo root
            VER=$(cat VERSION)
            TAG="v${VER}"
            NAME="Papiere v${VER} — rolling build"
            PRE=true
            LATEST=false
          fi

          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "name=${NAME}"       >> $GITHUB_OUTPUT
          echo "prerelease=${PRE}"  >> $GITHUB_OUTPUT
          echo "make_latest=${LATEST}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: papiere-*
          merge-multiple: false
          path: artifacts

      - name: Rename artifacts to include version tag
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          # Only move artifacts that were actually uploaded (build may have failed)
          [[ -f artifacts/papiere-macos/papiere-macos-arm64.zip ]] && \
            mv artifacts/papiere-macos/papiere-macos-arm64.zip \
               "papiere-macos-arm64-${TAG}.zip"
          [[ -f artifacts/papiere-linux/papiere-linux-x86_64.tar.gz ]] && \
            mv artifacts/papiere-linux/papiere-linux-x86_64.tar.gz \
               "papiere-linux-x86_64-${TAG}.tar.gz"
          [[ -f artifacts/papiere-windows/papiere-windows-x64.zip ]] && \
            mv artifacts/papiere-windows/papiere-windows-x64.zip \
               "papiere-windows-x64-${TAG}.zip"
          # Build a comma-separated list of whatever actually exists
          ARTS=""
          for f in \
            "papiere-macos-arm64-${TAG}.zip" \
            "papiere-linux-x86_64-${TAG}.tar.gz" \
            "papiere-windows-x64-${TAG}.zip"; do
            [[ -f "$f" ]] && ARTS="${ARTS:+$ARTS,}$f"
          done
          echo "artifacts=${ARTS}" >> $GITHUB_OUTPUT
        id: pack

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          makeLatest: ${{ steps.meta.outputs.make_latest }}
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: false
          artifacts: ${{ steps.pack.outputs.artifacts }}
          token: ${{ secrets.GITHUB_TOKEN }}
